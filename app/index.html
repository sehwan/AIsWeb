<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AllAI - Multi Perspective AI</title>
  <style>
    :root {
      --bg-dark: #0a0c10;
      --panel-bg: #12161f;
      --border-color: #242933;
      --text-active: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; margin: 0; }
    
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text-active);
      display: flex;
      flex-direction: column;
    }

    .wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 10px;
      min-height: 0;
    }

    .grid4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    .panel {
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: border-color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    
    .panel:focus-within {
      border-color: var(--accent);
    }

    .panel-header {
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
      background: rgba(255,255,255,0.02);
    }

    h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-active);
    }

    .controls { display: flex; gap: 4px; align-items: center; }

    .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      color: var(--text-muted);
      transition: all 0.3s;
      border: 1px solid transparent;
    }

    .badge-ok { background: rgba(16, 185, 129, 0.1); color: var(--success); border-color: rgba(16,185,129,0.2); }
    .badge-warn { background: rgba(245, 158, 11, 0.1); color: var(--warning); border-color: rgba(245,158,11,0.2); }
    .badge-fail { background: rgba(239, 68, 68, 0.1); color: var(--danger); border-color: rgba(239,68,68,0.2); }
    .badge-sending { background: rgba(59, 130, 246, 0.1); color: var(--accent); border-color: rgba(59,130,246,0.2); animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    webview {
      flex: 1;
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }

    .footer {
      background: var(--panel-bg);
      border-top: 1px solid var(--border-color);
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-container {
      flex: 1;
      position: relative;
    }

    textarea {
      width: 100%;
      min-height: 48px;
      max-height: 120px;
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-active);
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      transition: all 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 180px;
    }

    .btn-row { display: flex; gap: 6px; }

    button {
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: #202632;
      color: var(--text-active);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      outline: none;
    }

    button:hover:not(:disabled) { background: #2a3242; border-color: var(--text-muted); }
    button:active:not(:disabled) { transform: translateY(1px); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #broadcastBtn {
      flex: 1;
      background: var(--accent);
      color: white;
      border: none;
      font-weight: 600;
    }

    #broadcastBtn:hover:not(:disabled) { background: #2563eb; }

    .refresh-btn, .open-ext {
      padding: 4px;
      font-size: 11px;
      background: transparent;
      border: 1px solid transparent;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
    }

    .refresh-btn:hover { color: var(--text-active); border-color: var(--border-color); }

    .bottom-bar {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }

    #status { color: var(--accent); font-weight: 500; }

  </style>
</head>

<body>
  <div class="wrap">
    <div class="grid4">
      <section class="panel">
        <div class="panel-header">
          <h2>Perplexity</h2>
          <div class="controls">
            <span class="badge" data-badge="perplexity">대기</span>
            <button class="refresh-btn" data-service="perplexity" title="새로고침">↻</button>
            <button class="open-ext" data-service="perplexity" title="브라우저 열기">↗</button>
          </div>
        </div>
        <webview id="wv-perplexity" src="https://www.perplexity.ai" partition="persist:perplexity"></webview>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Gemini</h2>
          <div class="controls">
            <span class="badge" data-badge="gemini">대기</span>
            <button class="refresh-btn" data-service="gemini" title="새로고침">↻</button>
            <button class="open-ext" data-url="https://gemini.google.com/app" title="브라우저 열기">↗</button>
          </div>
        </div>
        <webview id="wv-gemini" src="https://gemini.google.com" partition="persist:gemini"></webview>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Claude</h2>
          <div class="controls">
            <span class="badge" data-badge="claude">대기</span>
            <button class="refresh-btn" data-service="claude" title="새로고침">↻</button>
            <button class="open-ext" data-url="https://claude.ai" title="브라우저 열기">↗</button>
          </div>
        </div>
        <webview id="wv-claude" src="https://claude.ai" partition="persist:claude"></webview>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>ChatGPT</h2>
          <div class="controls">
            <span class="badge" data-badge="chatgpt">대기</span>
            <button class="refresh-btn" data-service="chatgpt" title="새로고침">↻</button>
            <button class="open-ext" data-url="https://chatgpt.com" title="브라우저 열기">↗</button>
          </div>
        </div>
        <webview id="wv-chatgpt" src="https://chatgpt.com" partition="persist:chatgpt"></webview>
      </section>
    </div>
  </div>

  <footer class="footer">
    <div class="input-container">
      <textarea id="question" placeholder="모든 AI에게 질문하기..." spellcheck="false" autofocus></textarea>
      <div class="bottom-bar">
        <div>Enter: 전송 / Cmd+N: 초기화 / Cmd+Enter: 전송</div>
        <div id="status">연결됨</div>
      </div>
    </div>
    <div class="actions">
      <div class="btn-row">
        <button id="broadcastBtn">질문 보내기</button>
      </div>
      <div class="btn-row">
        <button id="newQuestionBtn" style="flex: 1;">새 대화</button>
        <button id="retryBtn" style="display:none; color: var(--danger);">재시도</button>
      </div>
      <div class="btn-row" style="margin-top: 4px; padding-top: 4px; border-top: 1px solid var(--border-color);">
        <button id="clearCacheBtn" title="로그인 정보를 유지하며 캐시만 정리합니다." style="flex: 1; font-size: 11px;">캐시 정리</button>
        <button id="resetAllBtn" title="모든 정보(로그인 포함)를 초기화합니다." style="flex: 1; font-size: 11px; border-color: rgba(239, 68, 68, 0.3);">전체 초기화</button>
      </div>
    </div>
  </footer>

  <script src="./renderer.js"></script>
</body>

</html>

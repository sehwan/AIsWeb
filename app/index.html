<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AllAI</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111111;
      color: #e5e5e5;
    }

    .wrap {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 6px;
    }

    .layout {
      display: flex;
      flex-direction: column;
      gap: 6px;
      height: 100%;
    }

    .grid4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      flex: 1;
      min-height: 0;
    }

    .panel {
      border: 1px solid #2a2a2a;
      background: #111111;
      border-radius: 8px;
      padding: 6px;
      overflow: hidden;
    }

    .panel.ai {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    h2 {
      margin: 0;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      min-height: 56px;
      resize: vertical;
      border-radius: 6px;
      border: 1px solid #2a2a2a;
      background: #0d0d0d;
      color: #e5e5e5;
      padding: 6px;
    }

    .input-row {
      display: flex;
      gap: 6px;
      align-items: stretch;
    }

    .input-row textarea {
      flex: 1;
      min-width: 0;
    }

    .input-side {
      width: 220px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 6px;
      padding: 6px 9px;
      background: #1b1b1b;
      color: #e5e5e5;
      cursor: pointer;
    }

    #status {
      margin-top: 6px;
      font-size: 12px;
      color: #bdbdbd;
      min-height: 18px;
    }

    .service-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .badge {
      border: 1px solid #2a2a2a;
      border-radius: 999px;
      font-size: 11px;
      padding: 2px 8px;
      color: #bdbdbd;
      transition: all 0.2s;
    }

    .badge-ok {
      border-color: #22c55e;
      color: #22c55e;
    }

    .badge-warn {
      border-color: #eab308;
      color: #eab308;
    }

    .badge-fail {
      border-color: #ef4444;
      color: #ef4444;
    }

    .badge-sending {
      border-color: #3b82f6;
      color: #3b82f6;
    }

    webview {
      width: 100%;
      flex: 1;
      height: 100%;
      min-height: 0;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      background: #0d0d0d;
    }

    .hint {
      font-size: 12px;
      color: #9e9e9e;
      margin: 0;
    }

    #status {
      margin: 0;
      font-size: 12px;
      color: #bdbdbd;
      min-height: 16px;
    }

    .open-ext {
      padding: 2px 6px;
      font-size: 12px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #e5e5e5;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .open-ext:hover {
      background: #333;
    }

    .refresh-btn {
      padding: 2px 6px;
      font-size: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #9e9e9e;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .refresh-btn:hover {
      background: #2a2a2a;
      color: #e5e5e5;
      border-color: #444;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="layout">
      <div class="grid4">
        <section class="panel ai">
          <div class="service-head">
            <h2>Perplexity</h2>
            <div style="display: flex; gap: 4px; align-items: center;">
              <span class="badge" data-badge="perplexity">대기</span>
              <button class="refresh-btn" data-service="perplexity" title="섹션 리프레쉬">↻</button>
              <button class="open-ext" data-url="https://www.perplexity.ai" title="브라우저에서 열기">↗</button>
            </div>
          </div>
          <webview id="wv-perplexity" src="https://www.perplexity.ai" partition="persist:perplexity"></webview>
        </section>

        <section class="panel ai">
          <div class="service-head">
            <h2>Google Gemini</h2>
            <div style="display: flex; gap: 4px; align-items: center;">
              <span class="badge" data-badge="gemini">대기</span>
              <button class="refresh-btn" data-service="gemini" title="섹션 리프레쉬">↻</button>
              <button class="open-ext" data-url="https://gemini.google.com/app" title="브라우저에서 열기">↗</button>
            </div>
          </div>
          <webview id="wv-gemini" src="https://gemini.google.com" partition="persist:gemini"></webview>
        </section>

        <section class="panel ai">
          <div class="service-head">
            <h2>Claude</h2>
            <div style="display: flex; gap: 4px; align-items: center;">
              <span class="badge" data-badge="claude">대기</span>
              <button class="refresh-btn" data-service="claude" title="섹션 리프레쉬">↻</button>
              <button class="open-ext" data-url="https://claude.ai" title="브라우저에서 열기">↗</button>
            </div>
          </div>
          <webview id="wv-claude" src="https://claude.ai" partition="persist:claude"></webview>
        </section>

        <section class="panel ai">
          <div class="service-head">
            <h2>ChatGPT</h2>
            <div style="display: flex; gap: 4px; align-items: center;">
              <span class="badge" data-badge="chatgpt">대기</span>
              <button class="refresh-btn" data-service="chatgpt" title="섹션 리프레쉬">↻</button>
              <button class="open-ext" data-url="https://chatgpt.com" title="브라우저에서 열기">↗</button>
            </div>
          </div>
          <webview id="wv-chatgpt" src="https://chatgpt.com" partition="persist:chatgpt"></webview>
        </section>
      </div>
      <section class="panel">
        <div class="input-row">
          <textarea id="question" placeholder="질문을 입력하세요..."></textarea>
          <div class="input-side">
            <div class="row">
              <button id="broadcastBtn">질문하기</button>
              <button id="newQuestionBtn">새 질문</button>
              <button id="retryBtn" style="display:none; background:#2a1a1a; color:#ef4444;">재시도</button>
            </div>
            <div class="hint">Enter: 질문 / Cmd+N: 새 질문</div>
            <div id="status"></div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>

</html>
